<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actualización de tu registro — DotNet Ecuador</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
          <!-- Header -->
          <tr>
            <td style="background-color:#7B2FBE;padding:32px 40px;text-align:center;">
              <h1 style="color:#ffffff;margin:0;font-size:24px;font-weight:700;">DotNet Ecuador</h1>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:40px;">
              <h2 style="color:#1a1a2e;margin-top:0;">Hola, {{nombre}}</h2>
              <p style="color:#444;line-height:1.6;">Lamentablemente no pudimos verificar tu pago para el evento:</p>
              <div style="background:#f8f4ff;border-left:4px solid #7B2FBE;padding:16px 20px;border-radius:4px;margin:20px 0;">
                <strong style="color:#7B2FBE;font-size:18px;">{{evento}}</strong>
              </div>
              <p style="color:#444;line-height:1.6;"><strong>Motivo:</strong></p>
              <div style="background:#fff3f3;border-left:4px solid #e53e3e;padding:16px 20px;border-radius:4px;margin:12px 0;">
                <span style="color:#c53030;">{{motivo}}</span>
              </div>
              <p style="color:#444;line-height:1.6;">Si crees que esto es un error o necesitas ayuda, contáctanos:</p>
              <p style="text-align:center;margin:24px 0;">
                <a href="mailto:{{contacto}}"
                   style="background-color:#7B2FBE;color:#ffffff;padding:12px 28px;border-radius:6px;text-decoration:none;font-weight:bold;display:inline-block;">
                  Contactar soporte
                </a>
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#f8f8f8;padding:24px 40px;text-align:center;border-top:1px solid #eee;">
              <p style="color:#999;font-size:12px;margin:0;">DotNet Ecuador · Comunidad .NET en Ecuador</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
